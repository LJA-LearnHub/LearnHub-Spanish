<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pasaporte — Tu viaje por el español</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500;1,9..144,600&family=Inter:wght@400;500;600;700&family=Special+Elite&display=swap" rel="stylesheet">
<style>
/* ============ TOKENS ============ */
:root{
  --paper:#ECE0C4;
  --paper-light:#F8F1E0;
  --paper-dark:#DECBA0;
  --ink:#1F2A44;
  --ink-soft:#566085;
  --teal:#1B7A72;
  --teal-deep:#11534D;
  --red:#B0392D;
  --red-deep:#812A21;
  --gold:#C18F2C;
  --line:rgba(31,42,68,0.20);
  --shadow:0 3px 10px rgba(31,42,68,0.16);
  --shadow-lg:0 8px 24px rgba(31,42,68,0.22);
  --radius:16px;
  --max-w:480px;
}
*{box-sizing:border-box;}
html{-webkit-text-size-adjust:100%;}
body{
  margin:0;
  font-family:'Inter',-apple-system,sans-serif;
  color:var(--ink);
  background-color:var(--paper);
  background-image:repeating-linear-gradient(to bottom,transparent,transparent 26px,var(--line) 26px,var(--line) 27px);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,h4{font-family:'Fraunces',serif;margin:0;}
p{margin:0;}
button{font-family:inherit;}
.eyebrow{
  font-family:'Special Elite',monospace;
  font-size:11px;
  letter-spacing:1.2px;
  text-transform:uppercase;
  color:var(--ink-soft);
}
button:focus-visible, a:focus-visible, [tabindex]:focus-visible{
  outline:3px solid var(--gold);
  outline-offset:2px;
}
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:0.01ms !important;animation-iteration-count:1 !important;transition-duration:0.01ms !important;}
}

/* ============ APP SHELL ============ */
#app{max-width:var(--max-w);margin:0 auto;min-height:100vh;position:relative;padding-bottom:88px;}

.app-header{
  padding:22px 20px 18px;
  border-bottom:3px double var(--ink);
  background:linear-gradient(180deg,var(--paper-light),transparent);
}
.app-title{font-size:30px;font-weight:700;color:var(--ink);letter-spacing:-0.5px;}
.app-title em{color:var(--teal);font-style:italic;font-weight:500;}
.app-sub{margin-top:4px;font-size:14px;color:var(--ink-soft);font-style:italic;font-family:'Fraunces',serif;}

.back-row{display:flex;align-items:center;gap:10px;padding:18px 20px 4px;}
.back-btn{
  display:flex;align-items:center;gap:6px;
  background:none;border:none;color:var(--ink);
  font-size:14px;font-weight:600;cursor:pointer;padding:6px 4px;min-height:32px;
}
.back-btn svg{width:16px;height:16px;}

.screen{padding:4px 20px 28px;}

/* ============ BOTTOM NAV ============ */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;
  max-width:var(--max-w);margin:0 auto;
  background:var(--paper-light);
  border-top:1px solid var(--line);
  display:flex;justify-content:space-around;align-items:center;
  padding:6px 4px max(6px,env(safe-area-inset-bottom));
  z-index:20;
}
.nav-item{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  background:none;border:none;cursor:pointer;
  padding:6px 10px;min-width:60px;min-height:48px;
  color:var(--ink-soft);
}
.nav-item.active{color:var(--teal);}
.nav-item svg{width:22px;height:22px;}
.nav-icon-stamp{
  width:20px;height:20px;border-radius:50%;border:2px solid currentColor;
  display:flex;align-items:center;justify-content:center;
  font-family:'Special Elite',monospace;font-size:10px;
}
.nav-label{font-size:10.5px;font-weight:600;letter-spacing:0.2px;}

/* ============ HOME ============ */
.intro-line{font-size:14px;color:var(--ink-soft);line-height:1.5;margin:14px 0 18px;}
.intro-line strong{color:var(--ink);}

.level-card{
  display:block;width:100%;text-align:left;
  background:var(--paper-light);
  border:2px solid var(--ink);
  border-radius:var(--radius);
  padding:18px;margin-bottom:16px;
  cursor:pointer;
  box-shadow:var(--shadow);
  position:relative;
  overflow:hidden;
}
.level-card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;}
.level-card h2{font-size:22px;font-weight:700;}
.level-card .eyebrow{display:block;margin-bottom:4px;}
.level-meta{font-size:13px;color:var(--ink-soft);margin-top:6px;line-height:1.5;}
.level-progress-track{
  margin-top:14px;height:8px;border-radius:5px;
  background:var(--paper-dark);overflow:hidden;
}
.level-progress-fill{height:100%;background:var(--teal);border-radius:5px;transition:width 0.4s ease;}
.level-progress-label{margin-top:6px;font-size:12px;color:var(--ink-soft);font-weight:600;}
.level-card-stamp{flex-shrink:0;}

.home-stats{display:flex;gap:10px;margin:18px 0 22px;flex-wrap:wrap;}
.stat-box{
  flex:1;min-width:78px;background:var(--paper-light);border:1.5px solid var(--line);
  border-radius:12px;padding:12px 8px;text-align:center;
}
.stat-num{font-family:'Fraunces',serif;font-size:22px;font-weight:700;color:var(--teal);}
.stat-label{font-size:10px;color:var(--ink-soft);margin-top:2px;text-transform:uppercase;letter-spacing:0.3px;}

.how-box{
  border:1.5px dashed var(--line);border-radius:12px;padding:14px 16px;margin-top:6px;
}
.how-box h3{font-size:13px;text-transform:uppercase;letter-spacing:0.6px;color:var(--ink-soft);margin-bottom:8px;font-family:'Inter';font-weight:700;}
.how-steps{font-size:13.5px;color:var(--ink);line-height:2;}
.how-steps b{color:var(--teal);}
.how-steps span{color:var(--ink-soft);font-size:12px;}

/* ============ LEVEL SCREEN (unit grid) ============ */
.level-header-card{
  background:var(--paper-light);border:2px solid var(--ink);border-radius:var(--radius);
  padding:16px 18px;margin-bottom:18px;box-shadow:var(--shadow);
}
.level-header-card h2{font-size:24px;}
.unit-card{
  display:flex;align-items:center;gap:14px;width:100%;text-align:left;
  background:var(--paper-light);border:1.5px solid var(--line);border-radius:14px;
  padding:13px 14px;margin-bottom:10px;cursor:pointer;
}
.unit-card:active{background:var(--paper-dark);}
.unit-card-num{
  flex-shrink:0;width:38px;height:38px;border-radius:50%;
  background:var(--ink);color:var(--paper-light);
  display:flex;align-items:center;justify-content:center;
  font-family:'Fraunces',serif;font-weight:700;font-size:15px;
}
.unit-card-body{flex:1;min-width:0;}
.unit-card-title{font-weight:700;font-size:15.5px;}
.unit-card-en{font-size:12.5px;color:var(--ink-soft);margin-top:1px;}
.unit-card-country{
  display:inline-block;margin-top:5px;font-family:'Special Elite',monospace;
  font-size:10px;color:var(--ink-soft);letter-spacing:0.3px;
}
.unit-card-score{font-size:11px;color:var(--teal);font-weight:700;margin-top:3px;}

/* ============ STAMP (signature element) ============ */
.stamp{
  width:50px;height:50px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-family:'Special Elite',monospace;font-size:9px;letter-spacing:0.3px;text-align:center;
  position:relative;border:2.5px solid currentColor;
}
.stamp::after{
  content:'';position:absolute;inset:4px;border:1px solid currentColor;border-radius:50%;
}
.stamp.filled.teal{color:var(--teal);background:rgba(27,122,114,0.10);}
.stamp.filled.red{color:var(--red);background:rgba(176,57,45,0.10);}
.stamp.empty{color:var(--paper-dark);border-style:dashed;}
.stamp-lg{width:64px;height:64px;font-size:11px;}

/* ============ UNIT SCREEN ============ */
.unit-meta-card{
  background:var(--paper-light);border:2px solid var(--ink);border-radius:var(--radius);
  padding:16px 18px;margin-bottom:16px;box-shadow:var(--shadow);
}
.unit-meta-card h2{font-size:21px;}
.unit-meta-en{font-size:13px;color:var(--ink-soft);font-style:italic;margin-top:2px;font-family:'Fraunces',serif;}
.unit-meta-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
.tag{
  font-family:'Special Elite',monospace;font-size:10px;letter-spacing:0.3px;
  border:1px solid var(--ink-soft);color:var(--ink-soft);border-radius:20px;
  padding:3px 9px;
}

.tab-bar{display:flex;gap:6px;margin-bottom:18px;border-bottom:2px solid var(--line);}
.tab-btn{
  flex:1;background:none;border:none;cursor:pointer;
  padding:10px 4px;font-size:12.5px;font-weight:700;color:var(--ink-soft);
  border-bottom:3px solid transparent;margin-bottom:-2px;
  min-height:44px;
}
.tab-btn.active{color:var(--teal);border-bottom-color:var(--teal);}

/* ============ FLASHCARDS ============ */
.flash-counter{text-align:center;font-size:12px;color:var(--ink-soft);font-weight:600;margin-bottom:10px;}
.flashcard-wrap{perspective:1400px;margin-bottom:16px;}
.flashcard{
  position:relative;width:100%;height:230px;cursor:pointer;
  transform-style:preserve-3d;transition:transform 0.5s cubic-bezier(.4,.1,.2,1);
}
.flashcard.flipped{transform:rotateY(180deg);}
.flashcard-face{
  position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
  border:2px solid var(--ink);border-radius:var(--radius);background:var(--paper-light);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:20px;box-shadow:var(--shadow-lg);text-align:center;
}
.flashcard-back{transform:rotateY(180deg);}
.flash-word{font-family:'Fraunces',serif;font-size:28px;font-weight:600;color:var(--ink);}
.flash-pron{font-family:'Special Elite',monospace;font-size:13px;color:var(--ink-soft);margin-top:10px;}
.flash-en{font-family:'Fraunces',serif;font-size:23px;font-weight:600;color:var(--teal-deep);}
.flash-tap-hint{position:absolute;bottom:10px;font-size:10.5px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:0.4px;}
.flash-listen{
  margin-top:14px;display:inline-flex;align-items:center;gap:6px;
  background:var(--paper);border:1.5px solid var(--ink-soft);border-radius:20px;
  padding:7px 14px;font-size:12.5px;font-weight:600;color:var(--ink);cursor:pointer;
}
.flash-nav{display:flex;justify-content:space-between;gap:10px;}
.flash-dots{display:flex;gap:5px;align-items:center;flex-wrap:wrap;justify-content:center;margin:14px 0;}
.flash-dot{width:7px;height:7px;border-radius:50%;background:var(--paper-dark);}
.flash-dot.on{background:var(--teal);}

/* Useful phrases (vocab tab) */
.phrases-box{margin-top:24px;padding-top:18px;border-top:1.5px dashed var(--line);}
.phrases-title{font-size:13px;text-transform:uppercase;letter-spacing:0.5px;color:var(--ink-soft);font-weight:700;margin-bottom:10px;}
.phrase-item{display:flex;justify-content:space-between;align-items:baseline;gap:12px;padding:9px 0;border-bottom:1px solid var(--line);}
.phrase-item:last-child{border-bottom:none;}
.phrase-es{font-weight:600;font-size:13.5px;line-height:1.4;}
.phrase-en{font-size:11.5px;color:var(--ink-soft);text-align:right;flex-shrink:0;line-height:1.4;}

/* ============ BUTTONS ============ */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  border-radius:12px;padding:13px 18px;font-size:14.5px;font-weight:700;
  cursor:pointer;border:2px solid var(--ink);min-height:46px;
}
.btn-primary{background:var(--ink);color:var(--paper-light);}
.btn-secondary{background:var(--paper-light);color:var(--ink);}
.btn-ghost{background:none;border-color:transparent;color:var(--ink-soft);text-decoration:underline;}
.btn-block{width:100%;}
.btn-row{display:flex;gap:10px;margin-top:6px;}
.btn-row .btn{flex:1;}

/* ============ GRAMMAR ============ */
.grammar-section{margin-bottom:20px;padding-bottom:18px;border-bottom:1.5px dashed var(--line);}
.grammar-section:last-of-type{border-bottom:none;padding-bottom:4px;}
.grammar-point-num{font-family:'Special Elite',monospace;font-size:10.5px;color:var(--teal);text-transform:uppercase;letter-spacing:0.5px;display:block;margin-bottom:5px;}
.grammar-title{font-size:18.5px;margin-bottom:10px;line-height:1.3;}
.grammar-body{font-size:14.5px;line-height:1.7;color:var(--ink);margin-bottom:14px;}
.example-box{
  border-left:3px solid var(--gold);background:var(--paper-light);
  border-radius:0 10px 10px 0;padding:12px 14px;margin-bottom:8px;
}
.example-es{font-size:14.5px;font-weight:600;font-style:italic;display:flex;align-items:center;gap:6px;justify-content:space-between;}
.example-en{font-size:12.5px;color:var(--ink-soft);margin-top:3px;}
.mini-speak{background:none;border:none;cursor:pointer;font-size:13px;padding:2px 4px;flex-shrink:0;}

.conj-table{width:100%;border-collapse:collapse;margin:4px 0 16px;font-size:13px;}
.conj-table th,.conj-table td{border:1px solid var(--line);padding:7px 8px;text-align:left;}
.conj-table th{background:var(--paper-dark);font-family:'Special Elite',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.3px;font-weight:400;}
.conj-table td:first-child{font-weight:700;color:var(--ink-soft);white-space:nowrap;}
.table-caption{font-size:11.5px;color:var(--ink-soft);margin:-10px 0 14px;font-style:italic;}

.mistake-box{
  border:1.5px solid var(--red);border-radius:10px;background:rgba(176,57,45,0.06);
  padding:13px 14px;margin-top:8px;
}
.mistake-box h4{font-family:'Special Elite',monospace;font-size:11px;text-transform:uppercase;color:var(--red-deep);margin-bottom:9px;letter-spacing:0.4px;font-weight:400;}
.mistake-item{font-size:13px;line-height:1.65;margin-bottom:8px;padding-left:14px;position:relative;}
.mistake-item:last-child{margin-bottom:0;}
.mistake-item::before{content:'\2715';position:absolute;left:0;top:1px;color:var(--red);font-size:10px;}

/* ============ QUIZ ============ */
.quiz-progress{font-size:12px;color:var(--ink-soft);font-weight:600;margin-bottom:6px;display:flex;justify-content:space-between;}
.quiz-cat{display:inline-block;font-family:'Special Elite',monospace;font-size:9.5px;text-transform:uppercase;color:var(--teal-deep);background:rgba(27,122,114,0.10);border-radius:12px;padding:3px 9px;margin-bottom:10px;letter-spacing:0.3px;}
.quiz-q{font-size:17px;font-weight:600;line-height:1.4;margin-bottom:16px;}
.quiz-choice{
  display:flex;align-items:center;gap:10px;width:100%;text-align:left;
  padding:13px 14px;margin-bottom:9px;border:2px solid var(--ink);border-radius:11px;
  background:var(--paper-light);font-size:14.5px;cursor:pointer;min-height:46px;
}
.quiz-choice .letter{
  flex-shrink:0;width:24px;height:24px;border-radius:50%;border:1.5px solid currentColor;
  display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;
}
.quiz-choice.correct{border-color:var(--teal);background:rgba(27,122,114,0.13);}
.quiz-choice.incorrect{border-color:var(--red);background:rgba(176,57,45,0.13);}
.quiz-choice[disabled]{cursor:default;}
.quiz-feedback{font-size:13px;font-weight:600;margin:6px 0 14px;min-height:18px;}
.quiz-feedback.correct{color:var(--teal-deep);}
.quiz-feedback.incorrect{color:var(--red-deep);}

.results-wrap{text-align:center;padding:20px 4px;}
.results-stamp{margin:0 auto 16px;}
.results-score{font-family:'Fraunces',serif;font-size:38px;font-weight:700;}
.results-msg{font-size:14.5px;color:var(--ink-soft);margin:8px 0 20px;line-height:1.5;}
.results-breakdown{display:flex;justify-content:center;gap:14px;margin-bottom:18px;flex-wrap:wrap;}
.rb-item{font-size:11px;color:var(--ink-soft);text-align:center;}
.rb-num{display:block;font-family:'Fraunces',serif;font-size:16px;font-weight:700;color:var(--ink);}

/* ============ CULTURE ============ */
.culture-postmark{
  display:inline-block;border:2px solid var(--ink);border-radius:10px;
  padding:6px 14px;font-family:'Special Elite',monospace;font-size:13px;
  letter-spacing:0.5px;margin-bottom:16px;
}
.quickfacts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;}
.quickfact{background:var(--paper-light);border:1.5px solid var(--line);border-radius:10px;padding:10px 12px;}
.quickfact-label{font-family:'Special Elite',monospace;font-size:9px;text-transform:uppercase;color:var(--ink-soft);letter-spacing:0.4px;}
.quickfact-value{font-size:13px;font-weight:700;margin-top:3px;line-height:1.3;}
.culture-note{font-size:15px;line-height:1.75;color:var(--ink);}
.culture-note strong{color:var(--teal-deep);}
.culture-subhead{font-size:12px;text-transform:uppercase;letter-spacing:0.4px;color:var(--ink-soft);font-weight:700;margin:18px 0 8px;}

/* ============ PROGRESS SCREEN ============ */
.progress-top{
  display:flex;align-items:center;gap:14px;background:var(--paper-light);
  border:2px solid var(--ink);border-radius:var(--radius);padding:16px;margin-bottom:20px;
  box-shadow:var(--shadow);
}
.progress-ring{position:relative;width:64px;height:64px;flex-shrink:0;}
.progress-ring svg{transform:rotate(-90deg);}
.progress-ring-label{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:'Fraunces',serif;font-weight:700;font-size:14px;
}
.progress-section-title{font-size:13px;text-transform:uppercase;letter-spacing:0.5px;color:var(--ink-soft);font-weight:700;margin:18px 0 10px;}
.stamp-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px 8px;margin-bottom:8px;}
.stamp-grid-item{display:flex;flex-direction:column;align-items:center;gap:5px;}
.stamp-grid-label{font-size:9.5px;text-align:center;color:var(--ink-soft);line-height:1.2;}

.reset-zone{margin-top:30px;padding-top:18px;border-top:1.5px dashed var(--line);text-align:center;}
.reset-hint{font-size:12px;color:var(--ink-soft);margin-bottom:10px;}

/* loading */
.loading-wrap{display:flex;align-items:center;justify-content:center;min-height:60vh;}
.loading-text{font-family:'Fraunces',serif;font-style:italic;color:var(--ink-soft);}
</style>
</head>
<body>
<div id="app"></div>

<script>
/* =====================================================================
   COURSE DATA — TEKS §114.39 (Spanish I, Novice Mid–Novice High) and
   §114.40 (Spanish II, Novice High–Intermediate Low). Each unit now
   carries 16 vocab words, useful phrases, TWO grammar points (several
   with full conjugation tables), a common-mistakes callout, a 10
   question quiz, and a culture page with quick facts. Each unit still
   moves through a different Spanish-speaking country.
   ===================================================================== */
const COURSE = {
level1: {
  name: "Spanish I", code: "TEKS \u00A7114.39", proficiency: "Novice Mid \u2192 Novice High",
  units: [
    {
      id:"l1-1", title:"Saludos y Presentaciones", en:"Greetings & Introductions",
      teksFocus:"Interpersonal & Interpretive Communication", country:"Espa\u00F1a",
      vocab:[
        {es:"Hola", en:"Hello", pron:"OH-lah"},
        {es:"Buenos d\u00EDas", en:"Good morning", pron:"BWEH-nohs DEE-ahs"},
        {es:"Buenas tardes", en:"Good afternoon", pron:"BWEH-nahs TAR-dehs"},
        {es:"Buenas noches", en:"Good evening / night", pron:"BWEH-nahs NOH-chehs"},
        {es:"Adi\u00F3s", en:"Goodbye", pron:"ah-DYOHS"},
        {es:"\u00BFC\u00F3mo te llamas?", en:"What is your name? (informal)", pron:"KOH-moh teh YAH-mahs"},
        {es:"Me llamo...", en:"My name is...", pron:"meh YAH-moh"},
        {es:"Mucho gusto", en:"Nice to meet you", pron:"MOO-choh GOOS-toh"},
        {es:"Igualmente", en:"Likewise", pron:"ee-gwahl-MEHN-teh"},
        {es:"\u00BFC\u00F3mo est\u00E1s?", en:"How are you? (informal)", pron:"KOH-moh ehs-TAHS"},
        {es:"Bien, gracias", en:"Fine, thank you", pron:"byehn GRAH-syahs"},
        {es:"\u00BFDe d\u00F3nde eres?", en:"Where are you from? (informal)", pron:"deh DOHN-deh EH-rehs"},
        {es:"Soy de...", en:"I am from...", pron:"soy deh"},
        {es:"por favor", en:"please", pron:"por fah-VOR"},
        {es:"gracias / de nada", en:"thank you / you're welcome", pron:"GRAH-syahs / deh NAH-dah"},
        {es:"Hasta luego", en:"See you later", pron:"AHS-tah LWEH-goh"}
      ],
      phrases:[
        {es:"\u00A1Bienvenido/a!", en:"Welcome!"},
        {es:"\u00BFQu\u00E9 tal?", en:"How's it going? (casual)"},
        {es:"Encantado/a de conocerte.", en:"Delighted to meet you."},
        {es:"Lo siento, no entiendo.", en:"Sorry, I don't understand."},
        {es:"\u00BFPuedes repetir, por favor?", en:"Can you repeat that, please?"},
        {es:"Hasta ma\u00F1ana.", en:"See you tomorrow."}
      ],
      grammar:{
        points:[
          {

async function loadProgress(){
  try{
    const result = await window.storage.get('progress', false);
    if(result && result.value){ state.progress = JSON.parse(result.value); }
  }catch(e){ /* no saved progress yet \u2014 defaults stand */ }
  state.loaded = true;
  render();
}
async function saveProgress(){
  try{ await window.storage.set('progress', JSON.stringify(state.progress), false); }
  catch(e){ console.error('Could not save progress', e); }
}

function getLevel(key){ return COURSE[key]; }
function findUnit(unitId){
  for(const lvKey of ["level1","level2"]){
    const u = COURSE[lvKey].units.find(x=>x.id===unitId);
    if(u) return {unit:u, levelKey:lvKey};
  }
  return null;
}
function levelDone(levelKey){
  return COURSE[levelKey].units.filter(u=>state.progress.completed[u.id]).length;
}
function totalDone(){ return levelDone("level1")+levelDone("level2"); }
function totalUnits(){ return COURSE.level1.units.length + COURSE.level2.units.length; }
function stampHash(id){ let h=0; for(let i=0;i<id.length;i++){ h=(h*31+id.charCodeAt(i))%997; } return h; }
function stampRotation(id){ return (stampHash(id)%22)-11; }
function stampColor(id){ return stampHash(id)%2===0 ? "teal" : "red"; }
function esc(s){ return String(s); }
function speak(text){
  try{
    if(!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "es-MX"; u.rate = 0.92;
    window.speechSynthesis.speak(u);
  }catch(e){}
}

/* =====================================================================
   NAVIGATION
   ===================================================================== */
function goHome(){ state.screen="home"; render(); }
function goLevelScreen(levelKey){ state.screen="level"; state.level=levelKey; render(); }
function goProgress(){ state.screen="progress"; render(); }
function goUnit(levelKey, unitId){
  state.screen="unit"; state.level=levelKey; state.unitId=unitId; state.unitTab="vocab";
  state.flash={index:0, flipped:false};
  state.quiz={index:0, score:0, selected:null, answered:false, finished:false};
  render();
}
function setUnitTab(tab){ state.unitTab=tab; render(); }

/* Flashcards */
function flashFlip(){ state.flash.flipped = !state.flash.flipped; render(); }
function flashNext(){
  const {unit} = findUnit(state.unitId);
  state.flash.index = (state.flash.index+1) % unit.vocab.length;
  state.flash.flipped = false; render();
}
function flashPrev(){
  const {unit} = findUnit(state.unitId);
  state.flash.index = (state.flash.index-1+unit.vocab.length) % unit.vocab.length;
  state.flash.flipped = false; render();
}

/* Quiz */
function quizSelect(i){
  if(state.quiz.answered) return;
  const {unit} = findUnit(state.unitId);
  const q = unit.quiz[state.quiz.index];
  state.quiz.selected = i; state.quiz.answered = true;
  if(i===q.a) state.quiz.score++;
  render();
}
function quizNext(){
  const {unit} = findUnit(state.unitId);
  if(state.quiz.index < unit.quiz.length-1){
    state.quiz.index++; state.quiz.selected=null; state.quiz.answered=false; render();
  } else {
    state.quiz.finished = true;
    const frac = state.quiz.score / unit.quiz.length;
    const prev = state.progress.scores[unit.id] || 0;
    state.progress.scores[unit.id] = Math.max(prev, frac);
    state.progress.completed[unit.id] = true;
    saveProgress();
    render();
  }
}
function quizRetry(){
  state.quiz = {index:0, score:0, selected:null, answered:false, finished:false};
  render();
}

let resetArmed = false;
function resetProgress(){
  if(!resetArmed){ resetArmed = true; render(); return; }
  state.progress = {completed:{}, scores:{}};
  resetArmed = false;
  saveProgress(); render();
}
function cancelReset(){ resetArmed=false; render(); }

/* =====================================================================
   RENDER \u2014 SCREENS
   ===================================================================== */
function render(){
  const app = document.getElementById('app');
  if(!state.loaded){
    app.innerHTML = '<div class="loading-wrap"><p class="loading-text">Cargando tu pasaporte\u2026</p></div>';
    return;
  }
  let html = "";
  if(state.screen==="home") html = renderHeader()+renderHome();
  else if(state.screen==="level") html = renderBack(()=>"goHome()", "Inicio")+renderLevelScreen();
  else if(state.screen==="unit") html = renderBack(()=>`goLevelScreen('${state.level}')`, getLevel(state.level).name)+renderUnitScreen();
  else if(state.screen==="progress") html = renderHeader()+renderProgressScreen();
  app.innerHTML = `<div class="screen-wrap">${html}</div>` + renderNav();
  window.scrollTo(0,0);
}

function renderHeader(){
  return `<div class="app-header">
    <h1 class="app-title">Pasaporte<em>.</em></h1>
    <p class="app-sub">Tu viaje por el espa\u00F1ol \u00B7 Spanish I &amp; II</p>
  </div>`;
}
function renderBack(targetFn, label){
  return `<div class="back-row">
    <button class="back-btn" onclick="${targetFn()}" aria-label="Volver">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
      ${label}
    </button>
  </div>`;
}

function renderHome(){
  const d1 = levelDone("level1"), d2 = levelDone("level2"), tot = totalDone(), totU = totalUnits();
  const vocabCount = COURSE.level1.units.reduce((s,u)=>s+u.vocab.length,0) + COURSE.level2.units.reduce((s,u)=>s+u.vocab.length,0);
  const quizCount = COURSE.level1.units.reduce((s,u)=>s+u.quiz.length,0) + COURSE.level2.units.reduce((s,u)=>s+u.quiz.length,0);
  return `<div class="screen">
    <p class="intro-line">Pr\u00E1ctica diaria de vocabulario, gram\u00E1tica y cultura para tu clase de espa\u00F1ol \u2014 alineado a los <strong>Texas TEKS \u00A7114.39 / \u00A7114.40</strong>. Cada unidad te lleva a un pa\u00EDs hispanohablante distinto, con dos puntos de gram\u00E1tica, tablas de conjugaci\u00F3n y un quiz de 10 preguntas.</p>

    ${renderLevelCard("level1", d1)}
    ${renderLevelCard("level2", d2)}

    <div class="home-stats">
      <div class="stat-box"><div class="stat-num">${tot}/${totU}</div><div class="stat-label">Unidades</div></div>
      <div class="stat-box"><div class="stat-num">${vocabCount}</div><div class="stat-label">Palabras</div></div>
      <div class="stat-box"><div class="stat-num">${quizCount}</div><div class="stat-label">Preguntas</div></div>
      <div class="stat-box"><div class="stat-num">${Object.keys(state.progress.completed).length}</div><div class="stat-label">Sellos</div></div>
    </div>

    <div class="how-box">
      <h3>C\u00F3mo funciona cada unidad</h3>
      <div class="how-steps">
        <b>Vocabulario</b> \u2014 16 palabras + frases \u00FAtiles, con audio <span>(Interpretive)</span><br>
        <b>Gram\u00E1tica</b> \u2014 2 puntos con tablas y errores comunes <span>(Presentational)</span><br>
        <b>Pr\u00E1ctica</b> \u2014 quiz de 10 preguntas por categor\u00EDa <span>(todas las destrezas)</span><br>
        <b>Cultura</b> \u2014 datos r\u00E1pidos + nota cultural extensa <span>(Cultures)</span>
      </div>
    </div>
  </div>`;
}

function renderLevelCard(levelKey, done){
  const lv = getLevel(levelKey);
  const totalU = lv.units.length;
  const pct = Math.round((done/totalU)*100);
  return `<button class="level-card" onclick="goLevelScreen('${levelKey}')">
    <div class="level-card-top">
      <div>
        <span class="eyebrow">${lv.code}</span>
        <h2>${lv.name}</h2>
        <p class="level-meta">${lv.proficiency} Proficiency<br>${totalU} unidades \u00B7 8 pa\u00EDses \u00B7 ${lv.units.reduce((s,u)=>s+u.vocab.length,0)} palabras</p>
      </div>
      <div class="level-card-stamp">${stampSVG(levelKey, done===totalU, done===totalU? (levelKey==="level1"?"teal":"red") : null, "stamp-lg", levelKey==="level1"?"N1":"N2")}</div>
    </div>
    <div class="level-progress-track"><div class="level-progress-fill" style="width:${pct}%"></div></div>
    <div class="level-progress-label">${done} de ${totalU} unidades \u00B7 ${pct}%</div>
  </button>`;
}

function stampSVG(id, filled, colorOverride, sizeClass, label){
  const color = colorOverride || stampColor(id);
  const rot = stampRotation(id);
  const cls = filled ? `stamp filled ${color}` : "stamp empty";
  return `<div class="${cls} ${sizeClass||''}" style="transform:rotate(${rot}deg)">${esc(label)}</div>`;
}

function renderLevelScreen(){
  const lv = getLevel(state.level);
  return `<div class="screen">
    <div class="level-header-card">
      <span class="eyebrow">${lv.code} \u00B7 ${lv.proficiency}</span>
      <h2>${lv.name}</h2>
    </div>
    ${lv.units.map((u,i)=>renderUnitCard(u,i)).join("")}
  </div>`;
}

function renderUnitCard(u, i){
  const done = !!state.progress.completed[u.id];
  const score = state.progress.scores[u.id];
  return `<button class="unit-card" onclick="goUnit('${state.level}','${u.id}')">
    ${done ? stampSVG(u.id, true, null, "", "\u2713") : `<div class="unit-card-num">${i+1}</div>`}
    <div class="unit-card-body">
      <div class="unit-card-title">${u.title}</div>
      <div class="unit-card-en">${u.en}</div>
      <span class="unit-card-country">\u2708 ${u.country}</span>
      ${score!==undefined ? `<div class="unit-card-score">Mejor puntaje: ${Math.round(score*100)}%</div>` : ""}
    </div>
  </button>`;
}

function renderUnitScreen(){
  const {unit} = findUnit(state.unitId);
  const tabs = [["vocab","Vocabulario"],["grammar","Gram\u00E1tica"],["quiz","Pr\u00E1ctica"],["culture","Cultura"]];
  return `<div class="screen">
    <div class="unit-meta-card">
      <h2>${unit.title}</h2>
      <p class="unit-meta-en">${unit.en}</p>
      <div class="unit-meta-row">
        <span class="tag">${unit.teksFocus}</span>
        <span class="tag">\u2708 ${unit.country}</span>
      </div>
    </div>
    <div class="tab-bar">
      ${tabs.map(([key,label])=>`<button class="tab-btn ${state.unitTab===key?'active':''}" onclick="setUnitTab('${key}')">${label}</button>`).join("")}
    </div>
    ${state.unitTab==="vocab" ? renderVocabTab(unit) : ""}
    ${state.unitTab==="grammar" ? renderGrammarTab(unit) : ""}
    ${state.unitTab==="quiz" ? renderQuizTab(unit) : ""}
    ${state.unitTab==="culture" ? renderCultureTab(unit) : ""}
  </div>`;
}

function renderVocabTab(unit){
  const v = unit.vocab[state.flash.index];
  const dots = unit.vocab.map((_,i)=>`<span class="flash-dot ${i===state.flash.index?'on':''}"></span>`).join("");
  return `
    <div class="flash-counter">Tarjeta ${state.flash.index+1} de ${unit.vocab.length}</div>
    <div class="flashcard-wrap">
      <div class="flashcard ${state.flash.flipped?'flipped':''}" onclick="flashFlip()">
        <div class="flashcard-face flashcard-front">
          <div class="flash-word" lang="es">${v.es}</div>
          <div class="flash-pron">${v.pron}</div>
          <span class="flash-tap-hint">Toca para traducir</span>
        </div>
        <div class="flashcard-face flashcard-back">
          <div class="flash-en">${v.en}</div>
          <span class="flash-tap-hint">Toca para volver</span>
        </div>
      </div>
    </div>
    <div style="text-align:center;">
      <button class="flash-listen" onclick="event.stopPropagation(); speak('${v.es.replace(/'/g,"\\'")}')">\uD83D\uDD0A Escuchar</button>
    </div>
    <div class="flash-dots">${dots}</div>
    <div class="flash-nav">
      <button class="btn btn-secondary" onclick="flashPrev()">\u2190 Anterior</button>
      <button class="btn btn-secondary" onclick="flashNext()">Siguiente \u2192</button>
    </div>
    <div class="phrases-box">
      <div class="phrases-title">Frases \u00FAtiles de esta unidad</div>
      ${unit.phrases.map(ph=>`<div class="phrase-item"><span class="phrase-es" lang="es">${ph.es}</span><span class="phrase-en">${ph.en}</span></div>`).join("")}
    </div>`;
}

function renderTable(table){
  if(!table) return "";
  return `<table class="conj-table"><thead><tr>${table.headers.map(h=>`<th>${h}</th>`).join("")}</tr></thead><tbody>${table.rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join("")}</tr>`).join("")}</tbody></table>`;
}

function renderGrammarTab(unit){
  const g = unit.grammar;
  return `
    ${g.points.map((p,i)=>`
      <div class="grammar-section">
        <span class="grammar-point-num">Punto ${i+1} de ${g.points.length}</span>
        <h3 class="grammar-title">${p.title}</h3>
        <p class="grammar-body">${p.body}</p>
        ${renderTable(p.table)}
        ${p.examples.map(ex=>`<div class="example-box"><div class="example-es" lang="es"><span>${ex.es}</span><button class="mini-speak" onclick="event.stopPropagation();speak('${ex.es.replace(/'/g,"\\'")}')" aria-label="Escuchar">\uD83D\uDD0A</button></div><div class="example-en">${ex.en}</div></div>`).join("")}
      </div>
    `).join("")}
    ${g.mistakes ? `<div class="mistake-box"><h4>\u26A0 Errores comunes</h4>${g.mistakes.map(m=>`<div class="mistake-item">${m}</div>`).join("")}</div>` : ""}
  `;
}

function renderQuizTab(unit){
  if(state.quiz.finished){
    const total = unit.quiz.length;
    const pct = Math.round((state.quiz.score/total)*100);
    const stampColorChoice = pct>=80?"teal":"red";
    let msg = "Sigue practicando \u2014 vuelve a intentarlo cuando quieras.";
    if(pct>=80) msg = "\u00A1Excelente trabajo! Dominas esta unidad.";
    else if(pct>=50) msg = "Buen progreso. Repasa las tarjetas y la gram\u00E1tica, y vuelve a intentarlo.";
    const cats = {};
    unit.quiz.forEach((q,i)=>{ cats[q.cat] = cats[q.cat]||{c:0,t:0}; cats[q.cat].t++; });
    return `<div class="results-wrap">
      <div class="results-stamp">${stampSVG(unit.id, true, stampColorChoice, "stamp-lg", pct+"%")}</div>
      <div class="results-score">${state.quiz.score} / ${total}</div>
      <p class="results-msg">${msg}</p>
      <div class="btn-row">
        <button class="btn btn-secondary" onclick="quizRetry()">Intentar de nuevo</button>
        <button class="btn btn-primary" onclick="goLevelScreen('${state.level}')">Volver al nivel</button>
      </div>
    </div>`;
  }
  const q = unit.quiz[state.quiz.index];
  const letters = ["A","B","C","D"];
  let feedback = "";
  if(state.quiz.answered){
    feedback = state.quiz.selected===q.a
      ? `<div class="quiz-feedback correct">\u2713 \u00A1Correcto!</div>`
      : `<div class="quiz-feedback incorrect">\u2717 La respuesta correcta es: ${q.choices[q.a]}</div>`;
  }
  return `
    <div class="quiz-progress"><span>Pregunta ${state.quiz.index+1} de ${unit.quiz.length}</span><span>Puntaje: ${state.quiz.score}</span></div>
    <div class="quiz-cat">${q.cat}</div>
    <div class="quiz-q">${q.q}</div>
    ${q.choices.map((c,i)=>{
      let cls = "quiz-choice";
      if(state.quiz.answered){
        if(i===q.a) cls += " correct";
        else if(i===state.quiz.selected) cls += " incorrect";
      }
      return `<button class="${cls}" ${state.quiz.answered?'disabled':''} onclick="quizSelect(${i})">
        <span class="letter">${letters[i]}</span><span>${c}</span>
      </button>`;
    }).join("")}
    ${feedback}
    ${state.quiz.answered ? `<button class="btn btn-primary btn-block" onclick="quizNext()">${state.quiz.index<unit.quiz.length-1?'Siguiente pregunta':'Ver resultados'}</button>` : ""}
  `;
}

function renderCultureTab(unit){
  const c = unit.culture;
  return `
    <div class="culture-postmark">\u2708 ${c.country}</div>
    <div class="quickfacts">
      <div class="quickfact"><div class="quickfact-label">Capital</div><div class="quickfact-value">${c.facts.capital}</div></div>
      <div class="quickfact"><div class="quickfact-label">Poblaci\u00F3n aprox.</div><div class="quickfact-value">${c.facts.population}</div></div>
      <div class="quickfact"><div class="quickfact-label">Idioma(s)</div><div class="quickfact-value">${c.facts.language}</div></div>
      <div class="quickfact"><div class="quickfact-label">Dato</div><div class="quickfact-value">${c.facts.extra}</div></div>
    </div>
    <p class="culture-note">${c.note}</p>`;
}

function renderProgressScreen(){
  const tot = totalDone(), totU = totalUnits();
  const pct = Math.round((tot/totU)*100);
  const circumference = 2*Math.PI*26;
  const dash = circumference*(pct/100);
  return `<div class="screen">
    <div class="progress-top">
      <div class="progress-ring">
        <svg width="64" height="64" viewBox="0 0 64 64">
          <circle cx="32" cy="32" r="26" fill="none" stroke="var(--paper-dark)" stroke-width="7"/>
          <circle cx="32" cy="32" r="26" fill="none" stroke="var(--teal)" stroke-width="7" stroke-linecap="round" stroke-dasharray="${dash} ${circumference}"/>
        </svg>
        <div class="progress-ring-label">${pct}%</div>
      </div>
      <div>
        <h2 style="font-size:19px;">Tu Pasaporte</h2>
        <p style="font-size:13px;color:var(--ink-soft);margin-top:3px;">${tot} de ${totU} unidades completadas</p>
      </div>
    </div>

    <div class="progress-section-title">Nivel 1 \u2014 Spanish I</div>
    <div class="stamp-grid">${COURSE.level1.units.map(u=>renderStampGridItem(u)).join("")}</div>

    <div class="progress-section-title">Nivel 2 \u2014 Spanish II</div>
    <div class="stamp-grid">${COURSE.level2.units.map(u=>renderStampGridItem(u)).join("")}</div>

    <div class="reset-zone">
      ${resetArmed ? `
        <p class="reset-hint">\u00BFBorrar todo tu progreso? Esto no se puede deshacer.</p>
        <div class="btn-row">
          <button class="btn btn-secondary" onclick="cancelReset()">Cancelar</button>
          <button class="btn btn-primary" style="background:var(--red);border-color:var(--red-deep);" onclick="resetProgress()">S\u00ED, borrar todo</button>
        </div>
      ` : `<button class="btn btn-ghost" onclick="resetProgress()">Reiniciar progreso</button>`}
    </div>
  </div>`;
}

function renderStampGridItem(u){
  const done = !!state.progress.completed[u.id];
  return `<div class="stamp-grid-item">
    ${stampSVG(u.id, done, null, "", done? "\u2713" : "?")}
    <div class="stamp-grid-label">${u.country}</div>
  </div>`;
}

function renderNav(){
  const items = [
    {key:"home", label:"Inicio", icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-7 9 7"/><path d="M5 10v10h14V10"/></svg>`},
    {key:"level1", label:"Nivel 1", icon:`<div class="nav-icon-stamp">1</div>`},
    {key:"level2", label:"Nivel 2", icon:`<div class="nav-icon-stamp">2</div>`},
    {key:"progress", label:"Progreso", icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M4 10h16M10 4v16"/></svg>`}
  ];
  function isActive(key){
    if(key==="home") return state.screen==="home";
    if(key==="level1") return state.level==="level1" && (state.screen==="level"||state.screen==="unit");
    if(key==="level2") return state.level==="level2" && (state.screen==="level"||state.screen==="unit");
    if(key==="progress") return state.screen==="progress";
  }
  function go(key){
    if(key==="home") return "goHome()";
    if(key==="progress") return "goProgress()";
    return `goLevelScreen('${key}')`;
  }
  return `<nav class="bottom-nav">
    ${items.map(it=>`<button class="nav-item ${isActive(it.key)?'active':''}" onclick="${go(it.key)}">${it.icon}<span class="nav-label">${it.label}</span></button>`).join("")}
  </nav>`;
}

/* =====================================================================
   INIT
   ===================================================================== */
loadProgress();
</script>
</body>
</html>
